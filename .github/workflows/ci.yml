name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  # Fast checks + the test suite that does not need the native backend.
  check:
    name: fmt + clippy + test (no llvm)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Test
        run: cargo test --workspace

  # The native/WASM backend path, gated behind the `llvm` feature (LLVM 18 + clang).
  llvm:
    name: clippy + test (llvm)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install LLVM 18
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 18
          echo "LLVM_SYS_181_PREFIX=/usr/lib/llvm-18" >> "$GITHUB_ENV"
      - name: Clippy (llvm)
        run: cargo clippy --workspace --all-targets --features blight-codegen/llvm,blight-repl/llvm -- -D warnings
      - name: Test (llvm)
        run: cargo test --workspace --features blight-codegen/llvm,blight-repl/llvm
