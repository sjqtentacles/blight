name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel an in-flight run when a newer commit is pushed to the same ref: during push-heavy
# iteration the old ~13-min run is dead weight, and each superseded run otherwise holds runner
# slots the new one then queues behind. `main` is excluded (group is unique per-SHA there) so no
# post-merge run is ever cancelled by a later merge.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings
  # sccache (set up by the setup-blight-llvm action) caches per-crate compilations across jobs/runs;
  # it cannot cache incremental artifacts, so incremental must be off — also the right default for CI.
  CARGO_INCREMENTAL: 0

jobs:
  # R1 (v0.1 roadmap): the checker compiles for wasm32-unknown-unknown with the `net` feature
  # off — the compile-only gate the browser playground (R2) builds on. Kernel + re-checker are
  # unconditionally wasm-clean; blight-elab drops its ureq/registry HTTP path via
  # --no-default-features.
  wasm-check:
    name: wasm32 checker (no net)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - run: cargo check -p blight-kernel -p blight-recheck --target wasm32-unknown-unknown
      - run: cargo check -p blight-elab --no-default-features --target wasm32-unknown-unknown
      # R2: the playground checker builds and answers over the raw C ABI under node.
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: cargo build -p blight-playground --release --target wasm32-unknown-unknown
      - run: node playground/smoke.mjs
      # R2: the static page assembles and every referenced asset exists in dist/.
      - run: ./playground/build.sh
      - run: |
          set -e
          for f in index.html playground.js worker.js examples.js blight_playground.wasm; do
            test -f "playground/dist/$f"
          done
          grep -q 'playground.js' playground/dist/index.html
          grep -q 'examples.js' playground/dist/playground.js
          grep -q 'worker.js' playground/dist/playground.js
          grep -q 'blight_playground.wasm' playground/dist/worker.js

  # Fast checks + the test suite that does not need the native backend. This is the canonical home for
  # the pure crates (kernel / elab / recheck / …): they carry no `llvm`/`graphics`-conditional code, so
  # the feature jobs below deliberately do NOT re-run them — this `--workspace` pass covers them once.
  check:
    name: fmt + clippy + test (no llvm)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Test
        run: cargo test --workspace
      # Wave 9 / T2: the Blight-source formatter must be a no-op on the whole `.bl` corpus (the
      # same idempotence/semantics-preservation guarantee `blight-elab/tests/fmt_corpus.rs` proves
      # at the unit level, gated here as a real pass/fail CI check on every PR).
      - name: blight fmt --check (.bl corpus)
        run: cargo run -p blight-repl --bin blight -- fmt --check examples crates/blight-prelude bench/games

  # The native/WASM backend path, gated behind the `llvm` feature (LLVM 18 + clang). Setup (toolchain,
  # shared compile cache, LLVM 18) is factored into the local `setup-blight-llvm` composite action,
  # reused by every llvm-family job below so the install/cache boilerplate lives in one place.
  #
  # The old single `llvm` job ran clippy → test → differential matrix → bench goldens → TSan strictly
  # SERIALLY; the three trailing gates are independent, so they are now their own jobs
  # (`llvm-differential`, `llvm-extras`) that run in parallel with this one, hidden under the long
  # pole's shadow rather than tacked onto the end of it. Tests here are scoped to the two feature crates
  # (`blight-codegen`, `blight-repl`) — the only crates with any `llvm`-conditional code — since the
  # pure crates compile identically with or without the feature and are already covered by `check`.
  llvm:
    name: clippy + test (llvm)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-blight-llvm
      - name: Clippy (llvm)
        run: cargo clippy -p blight-codegen -p blight-repl --all-targets --features blight-codegen/llvm,blight-repl/llvm -- -D warnings
      - name: Test (llvm)
        run: cargo test -p blight-codegen -p blight-repl --features blight-codegen/llvm,blight-repl/llvm

  # B1: the *full* differential bit-identity matrix (every fast-path on/off vs. the slow reference). It
  # is `#[ignore]`d in the normal run because it builds many native binaries; its own job runs it in
  # parallel with the main `llvm` test instead of serially after it.
  llvm-differential:
    name: differential matrix (llvm, bit-identity)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-blight-llvm
      - name: Differential matrix (full, bit-identity)
        run: cargo test -p blight-repl --features blight-codegen/llvm,blight-repl/llvm differential -- --ignored --nocapture

  # The two smaller native-backend gates, grouped in one parallel job (each is quick relative to a cold
  # LLVM setup, so grouping avoids paying that setup twice):
  #   - Bench goldens: each Blight benchmark impl must still print its committed golden value
  #     (correctness, not timing) — `bench/goldens.sh` builds its own release `blight`.
  #   - ThreadSanitizer over the share-nothing multicore runtime (workers, pools): the threaded C
  #     harnesses rebuilt with `-fsanitize=thread` when `BL_TSAN` is set catch data races in the
  #     thread-local GC / worker pool that the normal run cannot see.
  llvm-extras:
    name: bench goldens + tsan (llvm)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-blight-llvm
      - name: Bench goldens
        run: bash bench/goldens.sh
      - name: ThreadSanitizer (multicore runtime)
        env:
          BL_TSAN: "1"
        run: cargo test -p blight-codegen --features llvm -- share_nothing worker_pool --nocapture

  # Wave 10 / P2: the `graphics` cargo feature (runtime/graphics.c + SDL2), in its own job so the
  # default llvm jobs never need SDL2 dev headers. `SDL_VIDEODRIVER=dummy` (SDL's headless backend, no
  # real display/GPU needed) is exported for the whole job so every graphics test runs identically on a
  # GUI-less CI runner as against a real window. Tests scoped to the feature crates, same rationale as
  # the `llvm` job.
  graphics:
    name: clippy + test (llvm + graphics)
    runs-on: ubuntu-latest
    env:
      SDL_VIDEODRIVER: dummy
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-blight-llvm
        with:
          sdl2: "true"
      - name: Clippy (llvm + graphics)
        run: cargo clippy -p blight-codegen -p blight-repl --all-targets --features blight-codegen/graphics,blight-repl/graphics -- -D warnings
      - name: Test (llvm + graphics)
        run: cargo test -p blight-codegen -p blight-repl --features blight-codegen/graphics,blight-repl/graphics

  # D1: a *deterministic* gate on the committed fuzz seed corpus (Track D). `-runs=0` replays every
  # committed corpus file exactly once against the current build and exits non-zero on any crash —
  # "no previously-found input regresses" — without the flakiness/time-variance of fresh, time-boxed
  # fuzzing (that stays informational in fuzz.yml, on a nightly schedule). Corpus files are small
  # (committed, `fuzz/corpus/*`), so this finishes in seconds and is safe to gate every PR on.
  fuzz-corpus-replay:
    name: fuzz corpus replay (deterministic gate)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [reader, elab, kernel]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-fuzz
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-fuzz
      - name: Replay committed corpus (${{ matrix.target }})
        # Force the gnu target: cargo-fuzz otherwise defaults to `x86_64-unknown-linux-musl`, whose
        # statically-linked libc is incompatible with the address sanitizer ("sanitizer is
        # incompatible with statically linked libc"). gnu links libc dynamically, so ASan builds.
        run: cargo +nightly fuzz run ${{ matrix.target }} --target x86_64-unknown-linux-gnu -- -runs=0
      - name: Upload any crash artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-replay-crash-${{ matrix.target }}
          path: fuzz/artifacts
